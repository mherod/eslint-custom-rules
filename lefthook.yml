pre-commit:
  jobs:
    - run: npx ultracite fix
      glob:
        - "*.js"
        - "*.jsx"
        - "*.ts"
        - "*.tsx"
        - "*.json"
        - "*.jsonc"
        - "*.css"
      stage_fixed: true
    - run: command -v resect >/dev/null 2>&1 || exit 0; resect similar . --threshold=0.95
      skip:
        - merge
        - rebase
    - run: swiz memory --strict
      skip:
        - merge
        - rebase

commit-msg:
  jobs:
    - run: npx commitlint --edit
