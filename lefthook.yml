pre-commit:
  jobs:
    - run: npx ultracite fix
      glob:
        - "*.js"
        - "*.jsx"
        - "*.ts"
        - "*.tsx"
        - "*.json"
        - "*.jsonc"
        - "*.css"
      stage_fixed: true
    - run: 'command -v resect >/dev/null 2>&1 || { echo "Skipping similar check: resect not installed"; exit 0; }; resect similar . --threshold=0.95 --strict'
      skip:
        - merge
        - rebase
    - run: 'command -v swiz >/dev/null 2>&1 || { echo "Skipping memory check: swiz not installed"; exit 0; }; swiz memory --strict'
      skip:
        - merge
        - rebase

commit-msg:
  jobs:
    - run: npx commitlint --edit
